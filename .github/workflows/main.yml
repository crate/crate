---
name: CrateDB SQL
on:
  pull_request:
    paths:
      - '**.java'
      - 'pom.xml'
      - '**/pom.xml'
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  statuses: write

jobs:
  test:
    name: Test CrateDB SQL on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: false # disabled on this branch
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Maven Java
        uses: actions/setup-java@v5
        with:
          java-version: "25.0.3"
          distribution: "temurin"
          cache: maven

      - name: Run tests on ${{ matrix.os }}
        env:
          CRATE_TESTS_SQL_REQUEST_TIMEOUT: "20"
        run: |
          mvn test \
            -Dtests.crate.run-windows-incompatible=true \
            -DforkCount=2 \
            -DthreadCount=2 \
            -Dcheckstyle.skip \
            -Dforbiddenapis.skip=true \
            -Dmaven.javadoc.skip=true \
            -Djacoco.skip=true

      - name: Publish Test Report
        if: success() || failure()
        uses: ScalableCapital/action-surefire-report@1e92f48016e566e4eed2d81560edbfe0f524cfb7 #v2.0.3

  forbiddenApis:
    name: forbiddenApis
    runs-on: ubuntu-latest
    if: false # disabled on this branch
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Maven Java
        uses: actions/setup-java@v5
        with:
          java-version: "25.0.3"
          distribution: "temurin"
          cache: maven
      - name: Run forbiddenapis:check
        run: |
          mvn compile forbiddenapis:check

  checkstyle:
    name: checkstyle
    runs-on: ubuntu-latest
    if: false # disabled on this branch
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Maven Java
        uses: actions/setup-java@v5
        with:
          java-version: "25.0.3"
          distribution: "temurin"
      - name: Run checkstyle
        run: mvn compile checkstyle:checkstyle
