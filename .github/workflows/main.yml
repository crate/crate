---
name: CrateDB SQL
on:
  pull_request:
    paths:
      - '**.java'
      - 'pom.xml'
      - '**/pom.xml'
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test CrateDB SQL on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Maven Java
        uses: actions/setup-java@v5
        with:
          java-version: "26"
          distribution: "temurin"
          cache: maven

      - name: Run tests on ${{ matrix.os }}
        env:
          CRATE_TESTS_SQL_REQUEST_TIMEOUT: "20"
        run: |
          mvn test \
            -Dtests.crate.run-windows-incompatible=true \
            -DforkCount=2 \
            -DthreadCount=2 \
            -Dcheckstyle.skip \
            -Dforbiddenapis.skip=true \
            -Dmaven.javadoc.skip=true \
            -Djacoco.skip=true

      - name: Upload Surefire Reports
        # NB: intentionally not using always() because it covers canceled jobs as well.
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-${{ matrix.os }}
          path: '**/target/surefire-reports/**/*.xml'
          if-no-files-found: error
          retention-days: 7

  forbiddenApis:
    name: forbiddenApis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Maven Java
        uses: actions/setup-java@v5
        with:
          java-version: "26"
          distribution: "temurin"
          cache: maven
      - name: Run forbiddenapis:check
        run: |
          mvn compile forbiddenapis:check

  checkstyle:
    name: checkstyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Maven Java
        uses: actions/setup-java@v5
        with:
          java-version: "26"
          distribution: "temurin"
      - name: Run checkstyle
        run: mvn compile checkstyle:checkstyle
